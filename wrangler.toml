name = "sparkling-king-842b"
main = "worker.js"
compatibility_date = "2025-10-01"

# ─── Cron trigger : scan toutes les 5 min ───
# Le Worker filtre lui-même les heures de marché (isMarketTradingTime)
# donc on peut laisser le cron tourner en continu, il ne fait rien hors bourse.
[triggers]
crons = ["*/5 * * * *"]

# ─── KV namespace — stockage des signaux, alertes, cache ───
# Le binding `WOLF_DATA` est utilisé dans worker.js (env.WOLF_DATA).
# L'ID ci-dessous correspond au namespace existant sur Cloudflare.
[[kv_namespaces]]
binding = "WOLF_DATA"
id = "7a13d4dab7bb45318406c71f4394f9d6"

# ─── Observabilité : logs accessibles via `wrangler tail` ───
[observability]
enabled = true

# ─── Secrets (NE PAS mettre ici) ───
# DISCORD_WEBHOOK et WOLF_TOKEN se configurent via la commande :
#   wrangler secret put DISCORD_WEBHOOK
#   wrangler secret put WOLF_TOKEN
# ou dans le Dashboard → Settings → Variables → Environment Variables (Encrypted).
